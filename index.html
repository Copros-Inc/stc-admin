<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STC 管理画面 | 下関トレーニングセンター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+JP:wght@300;700;900&display=swap');
        
        * {
            font-family: 'Noto Sans JP', sans-serif;
        }
        
        .font-en {
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0b1120 0%, #1a2a4a 100%);
            color: #f1f5f9;
        }
        
        .sidebar {
            background: rgba(15, 23, 42, 0.9);
            border-right: 1px solid rgba(56, 189, 248, 0.2);
            min-height: 100vh;
            padding: 30px 20px;
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
        }
        
        .sidebar-logo {
            margin-bottom: 40px;
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }
        
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 900;
            color: #38bdf8;
            font-style: italic;
            margin-bottom: 5px;
        }
        
        .sidebar-subtitle {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 10px;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .nav-link:hover {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border-left-color: #38bdf8;
        }
        
        .nav-link.active {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            border-left-color: #38bdf8;
        }
        
        .nav-icon {
            width: 20px;
            text-align: center;
        }
        
        .main-content {
            margin-left: 280px;
            padding: 40px;
        }
        
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-style: italic;
        }
        
        .page-subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: bold;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.1);
        }
        
        .card-icon {
            font-size: 2.5rem;
            color: #38bdf8;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 1.25rem;
            font-weight: 900;
            margin-bottom: 8px;
            font-style: italic;
        }
        
        .card-description {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: bold;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .stat-box {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            color: #38bdf8;
            font-family: 'Montserrat';
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: bold;
            margin-top: 8px;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid rgba(56, 189, 248, 0.2);
                padding: 20px;
            }
            
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- サイドバー -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-title">STC</div>
            <div class="sidebar-subtitle">管理画面</div>
        </div>
        
        <nav>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link active">
                        <span class="nav-icon"><i class="fas fa-home"></i></span>
                        <span>ダッシュボード</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="schedule.html" class="nav-link">
                        <span class="nav-icon"><i class="fas fa-calendar"></i></span>
                        <span>スケジュール管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="reservations.html" class="nav-link">
                        <span class="nav-icon"><i class="fas fa-users"></i></span>
                        <span>予約受付管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="documents.html" class="nav-link">
                        <span class="nav-icon"><i class="fas fa-file-alt"></i></span>
                        <span>書類作成管理</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
    
    <!-- メインコンテンツ -->
    <div class="main-content">
        <div class="header">
            <h1 class="page-title">ダッシュボード</h1>
            <p class="page-subtitle">STC 管理画面へようこそ</p>
        </div>
        
        <!-- 統計情報 -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="total-schedules">0</div>
                <div class="stat-label">開催予定</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="total-reservations">0</div>
                <div class="stat-label">予約件数</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="available-seats">0</div>
                <div class="stat-label">空席数</div>
            </div>
        </div>
        
        <!-- 管理メニュー -->
        <div class="card-grid">
            <a href="schedule.html" class="card">
                <div class="card-icon"><i class="fas fa-calendar-plus"></i></div>
                <div class="card-title">スケジュール管理</div>
                <div class="card-description">講習スケジュールの追加・編集・削除</div>
            </a>
            
            <a href="reservations.html" class="card">
                <div class="card-icon"><i class="fas fa-list-check"></i></div>
                <div class="card-title">予約受付管理</div>
                <div class="card-description">申し込まれた予約情報の確認・管理</div>
            </a>
            
            <a href="documents.html" class="card">
                <div class="card-icon"><i class="fas fa-file-pdf"></i></div>
                <div class="card-title">書類作成管理</div>
                <div class="card-description">修了証や領収書などの書類作成</div>
            </a>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCrFI1MkCKdIT4mpzZWKdNPJZt3Gpyw",
            authDomain: "stc-hp.firebaseapp.com",
            projectId: "stc-hp",
            storageBucket: "stc-hp.firebasestorage.app",
            messagingSenderId: "795332931918",
            appId: "1:795332931918:web:dee7ea9d9fbe0ab0942e1f"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        signInAnonymously(auth).then(() => {
            // スケジュール数
            onSnapshot(collection(db, "schedules"), (snapshot) => {
                document.getElementById('total-schedules').textContent = snapshot.docs.length;
            });
            
            // 予約数
            onSnapshot(collection(db, "reservations"), (snapshot) => {
                document.getElementById('total-reservations').textContent = snapshot.docs.length;
            });
            
            // 空席数計算
            onSnapshot(collection(db, "schedules"), (snapshot) => {
                let totalSeats = 0;
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const capacity = data.capacity || 10;
                    const reserved = data.reserved || 0;
                    totalSeats += (capacity - reserved);
                });
                document.getElementById('available-seats').textContent = totalSeats;
            });
        });
    </script>
</body>
</html>
