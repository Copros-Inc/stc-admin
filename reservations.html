<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約受付管理 | STC 管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+JP:wght@300;700;900&display=swap');
        * { font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b1120; color: #f1f5f9; display: flex; min-height: 100vh; }
        
        /* 統一サイドバー */
        .sidebar { width: 260px; background: #0f172a; border-right: 1px solid rgba(56, 189, 248, 0.1); padding: 40px 20px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
        .sidebar-logo { text-align: center; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        .sidebar-title { font-size: 1.5rem; font-weight: 900; color: #38bdf8; font-style: italic; }
        .nav-link { display: flex; align-items: center; gap: 15px; padding: 14px 20px; color: #94a3b8; text-decoration: none; border-radius: 12px; font-weight: 700; transition: 0.3s; margin-bottom: 8px; font-size: 0.85rem; position: relative; }
        .nav-link.active { background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
        .badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #ef4444; color: white; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-family: 'Montserrat'; font-weight: 900; }
        
        .main-content { flex-grow: 1; padding: 40px 60px; overflow-y: auto; background: radial-gradient(circle at top right, #1e293b, #0b1120); }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-val { font-family: 'Montserrat'; font-size: 1.8rem; font-weight: 900; color: #fff; font-style: italic; }
        .stat-lab { font-size: 0.7rem; color: #cbd5e1; font-weight: 900; text-transform: uppercase; margin-top: 4px; }

        .table-container { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.1); border-radius: 24px; overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1000px; }
        .admin-table th { padding: 20px; font-weight: 900; color: #38bdf8; font-size: 0.7rem; text-transform: uppercase; background: rgba(56, 189, 248, 0.05); border-bottom: 1px solid rgba(56,189,248,0.2); }
        .admin-table td { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }

        .new-dot { background: #ef4444; width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #ef4444; }
        .wait-dot { background: #f59e0b; width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #f59e0b; }
        .tag-mode { font-size: 0.65rem; padding: 4px 10px; border-radius: 6px; font-weight: 900; white-space: nowrap; }
        .mode-full { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .mode-simple { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #0f172a; border: 1px solid #38bdf8; border-radius: 3rem; padding: 40px; width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; }
        .info-label { font-size: 0.65rem; color: #64748b; font-weight: 900; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .info-val { font-weight: 700; color: #fff; font-size: 1rem; }

        .btn-mail-action { background: #38bdf8; color: #0f172a; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; cursor: pointer; transition: 0.3s; white-space: nowrap; display: block; width: 100%; margin-bottom: 4px; }
        .btn-mail-action:hover { background: #fff; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><div class="sidebar-title">STC</div><div class="sidebar-subtitle">CONTROL PANEL</div></div>
        <nav>
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> <span>ダッシュボード</span></a>
            <a href="schedule.html" class="nav-link"><i class="fas fa-calendar-alt"></i> <span>スケジュール管理</span></a>
            <a href="reservations.html" class="nav-link active"><i class="fas fa-users"></i> <span>予約受付管理</span><span id="new-res-badge" class="badge" style="display:none">0</span></a>
            <a href="news.html" class="nav-link"><i class="fas fa-bullhorn"></i> <span>お知らせ管理</span></a>
            <a href="faq.html" class="nav-link"><i class="fas fa-question-circle"></i> <span>よくある質問管理</span></a>
            <a href="documents.html" class="nav-link"><i class="fas fa-file-alt"></i> <span>書類作成管理</span></a>
        </nav>
    </div>
    
    <div class="main-content">
        <div class="stat-grid">
            <div class="stat-card" style="border-top: 4px solid #38bdf8;"><div class="stat-val" id="stat-today">0</div><div class="stat-lab">本日申込</div></div>
            <div class="stat-card" style="border-top: 4px solid #ef4444;"><div class="stat-val text-red-500" id="stat-new">0</div><div class="stat-lab">未読(バッジ)</div></div>
            <div class="stat-card" style="border-top: 4px solid #f59e0b;"><div class="stat-val text-amber-500" id="stat-wait">0</div><div class="stat-lab">キャンセル待ち</div></div>
            <div class="stat-card" style="border-top: 4px solid #94a3b8;"><div class="stat-val" id="stat-total">0</div><div class="stat-lab">累計申込</div></div>
        </div>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th onclick="window.sortTable('createdAt')">受付日時 <i class="fas fa-sort ml-1"></i></th>
                        <th>種別</th>
                        <th onclick="window.sortTable('courseName')">講習名 / 日程 <i class="fas fa-sort ml-1"></i></th>
                        <th>受講生名</th>
                        <th>会社名</th>
                        <th>メール連絡</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="res-list"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
                <h2 class="text-2xl font-black italic text-sky-400 uppercase">Application Details</h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white text-3xl">&times;</button>
            </div>
            <div id="modal-body" class="grid md:grid-cols-3 gap-8 text-left"></div>
            <div class="mt-12 flex flex-wrap gap-4 pt-8 border-t border-white/5">
                <button id="btn-accept-final" class="bg-emerald-600 hover:bg-emerald-500 text-white px-10 py-4 rounded-xl font-black italic shadow-lg transition">受付を確定しバッジを消す</button>
                <button id="btn-wait-final" class="bg-amber-600 hover:bg-amber-500 text-white px-10 py-4 rounded-xl font-black italic shadow-lg transition">キャンセル待ちに登録</button>
                <button onclick="closeModal()" class="bg-slate-700 text-white px-10 py-4 rounded-xl font-black italic">閉じる</button>
                <button id="btn-delete-final" class="bg-red-900/50 text-red-400 px-6 py-4 rounded-xl font-black italic text-xs ml-auto">削除</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCrRf1MMCkR_dTIT4mpz2MWdNPJZt3GpYw", authDomain: "stc-hp.firebaseapp.com", projectId: "stc-hp", storageBucket: "stc-hp.firebasestorage.app", messagingSenderId: "795332931918", appId: "1:795332931918:web:dee7ea9d9fbe0ab0942e1f" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let reservations = [];
        let currentSort = { key: 'createdAt', order: 'desc' };

        signInAnonymously(auth).then(() => {
            onSnapshot(collection(db, "reservations"), (snap) => {
                reservations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateDashboard();
                renderTable();
            });
        });

        function updateDashboard() {
            const today = new Date().toLocaleDateString();
            document.getElementById('stat-today').innerText = reservations.filter(r => r.createdAt?.toDate().toLocaleDateString() === today).length;
            const unread = reservations.filter(r => r.status === 'new').length;
            document.getElementById('stat-new').innerText = unread;
            document.getElementById('stat-wait').innerText = reservations.filter(r => r.status === 'waiting').length;
            document.getElementById('stat-total').innerText = reservations.length;
            const badge = document.getElementById('new-res-badge');
            badge.innerText = unread; badge.style.display = unread > 0 ? 'block' : 'none';
        }

        window.sortTable = (key) => {
            if (currentSort.key === key) currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
            else { currentSort.key = key; currentSort.order = 'asc'; }
            renderTable();
        };

        function renderTable() {
            const listEl = document.getElementById('res-list');
            const sorted = [...reservations].sort((a, b) => {
                let valA = a[currentSort.key]; let valB = b[currentSort.key];
                if (currentSort.key === 'createdAt') { valA = valA?.toDate() || 0; valB = valB?.toDate() || 0; }
                if (valA < valB) return currentSort.order === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.order === 'asc' ? 1 : -1;
                return 0;
            });

            listEl.innerHTML = sorted.map(r => {
                const dateStr = r.createdAt?.toDate().toLocaleString('ja-JP') || '-';
                const isSent = r.mailStatus === 'sent' ? '<span class="text-[8px] text-emerald-400 font-black block text-center">✅ 送信済</span>' : '';
                let mailBtn = "";
                if(r.status === 'waiting') mailBtn = `<button class="btn-mail-action !bg-amber-600" onclick="window.sendMail('${r.id}', 'waiting')">待機依頼</button>`;
                else if(r.mode === 'full') mailBtn = `<button class="btn-mail-action" onclick="window.sendMail('${r.id}', 'guide')">受講案内</button>`;
                else mailBtn = `<button class="btn-mail-action !bg-slate-500" onclick="window.sendMail('${r.id}', 'simple')">書類提出依頼</button>`;

                return `
                <tr>
                    <td class="text-white font-bold font-en text-[11px]">${dateStr}</td>
                    <td><span class="tag-mode ${r.mode === 'full' ? 'mode-full' : 'mode-simple'}">${r.mode === 'full' ? '本申込' : '予約'}</span></td>
                    <td>
                        <div class="text-sky-400 font-black italic text-sm">${r.courseName}</div>
                        <div class="text-[11px] text-white font-bold opacity-70">${r.courseDate}</div>
                    </td>
                    <td class="font-black italic text-white text-base">
                        ${r.status === 'new' ? '<span class="new-dot"></span>' : r.status === 'waiting' ? '<span class="wait-dot"></span>' : ''}${r.userName}
                    </td>
                    <td class="text-slate-300 font-bold text-xs">${r.company || '個人'}</td>
                    <td><div class="w-32">${mailBtn}${isSent}</div></td>
                    <td><button class="bg-sky-500 text-white text-[10px] px-4 py-2 rounded-lg font-black italic shadow-lg" onclick="openDetail('${r.id}')">詳細</button></td>
                </tr>`;
            }).join('');
        }

               window.openDetail = (id) => {
            const r = reservations.find(item => item.id === id);
            const body = document.getElementById('modal-body');
            
            // 全データを「もしあれば表示する」リストを作成
            let detailsHtml = "";
            const row = (label, val) => { 
                if(val && val !== "undefined") detailsHtml += `
                    <div class="mb-4 border-b border-white/5 pb-2">
                        <span class="info-label text-sky-400 text-[10px] font-black uppercase tracking-widest">${label}</span>
                        <p class="text-white font-bold italic text-base">${val}</p>
                    </div>`; 
            };

            // 【基本情報】
            row("氏名(フリガナ)", `${r.userName} (${r.userKana || ''})`);
            row("生年月日", r.birthDate);
            row("現住所", r.address ? `〒${r.zip || ''} ${r.address}` : null);
            row("旧姓・通称希望", r.maidenName);
            
            // 【連絡先・勤務先】
            row("メールアドレス", r.email);
            row("本人電話番号", r.phone);
            row("勤務先名", r.company);
            row("勤務先電話", r.compPhone);
            row("勤務先住所", r.compAddress ? `〒${r.compZip || ''} ${r.compAddress}` : null);

            // 【免除資格・実務経験データ】(apply.htmlの全項目を網羅)
            row("免除区分/選択", r.exType || r.f11);
            row("修了証/免許番号", r.exNo || r.exNoB || r.licNo || r.licenseNo || r.spNo);
            row("交付機関", r.exOrg || r.exOrgB || r.spOrg);
            row("取得/修了日", r.exDate || r.exDateB || r.licDate || r.spDate);
            row("保有免許(チェック項目)", r.licChecked || r.licT);
            row("経験機体メーカー", r.mcM);
            row("経験機体 型式", r.mcT);
            row("経験機体 最大荷重", r.mcW);
            row("実務経験期間", r.mcExp);
            
            // 【事務・その他】
            row("助成金利用", r.subsidy);
            row("領収書の宛名", r.receipt === '必要' ? (r.receiptName || '要確認') : '不要');

            body.innerHTML = `
                <!-- 左側：写真エリア（4枚対応） -->
                <div class="space-y-6">
                    <div class="bg-slate-800 p-4 rounded-[2rem] border border-white/10 text-center shadow-2xl overflow-hidden">
                        <span class="info-label text-sky-400 mb-4 tracking-[0.2em]">Profile Photo</span>
                        ${r.photos?.user ? `<img src="${r.photos.user}" class="w-full rounded-2xl shadow-lg border-2 border-white/5">` : '<p class="text-slate-500 italic py-10">証明写真なし</p>'}
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-800 p-3 rounded-xl border border-white/5 text-center">
                            <span class="info-label text-[8px] mb-2 opacity-50">免許/証書表</span>
                            ${r.photos?.licA ? `<img src="${r.photos.licA}" class="w-full rounded shadow-md">` : '<p class="text-[9px] text-slate-600">なし</p>'}
                        </div>
                        <div class="bg-slate-800 p-3 rounded-xl border border-white/5 text-center">
                            <span class="info-label text-[8px] mb-2 opacity-50">免許/証書裏</span>
                            ${r.photos?.licB ? `<img src="${r.photos.licB}" class="w-full rounded shadow-md">` : '<p class="text-[9px] text-slate-600">なし</p>'}
                        </div>
                        <div class="bg-slate-800 p-3 rounded-xl border border-white/5 text-center">
                            <span class="info-label text-[8px] mb-2 opacity-50">特教/事業印</span>
                            ${r.photos?.spA || r.photos?.emp ? `<img src="${r.photos.spA || r.photos.emp}" class="w-full rounded shadow-md">` : '<p class="text-[9px] text-slate-600">なし</p>'}
                        </div>
                        <div class="bg-slate-800 p-3 rounded-xl border border-white/5 text-center">
                            <span class="info-label text-[8px] mb-2 opacity-50">特教裏/予備</span>
                            ${r.photos?.spB ? `<img src="${r.photos.spB}" class="w-full rounded shadow-md">` : '<p class="text-[9px] text-slate-600">なし</p>'}
                        </div>
                    </div>
                </div>

                <!-- 右側：全文字データエリア（2カラムで広々表示） -->
                <div class="md:col-span-2 bg-white/5 p-8 rounded-[2.5rem] border border-white/10 shadow-inner overflow-hidden">
                    <h3 class="text-sky-500 font-black italic text-sm mb-8 border-b-2 border-sky-500/30 pb-2 uppercase tracking-widest flex items-center">
                        <i class="fas fa-file-invoice mr-2"></i> Application Details
                    </h3>
                    <div class="grid md:grid-cols-2 gap-x-10">
                        ${detailsHtml || '<p class="text-slate-500 italic">データがありません</p>'}
                    </div>
                </div>
            `;
            
            // ボタンのクリックイベント再設定
            document.getElementById('btn-accept-final').onclick = () => window.processAction(r.id, 'accepted', r);
            document.getElementById('btn-wait-final').onclick = () => window.processAction(r.id, 'waiting', r);
            document.getElementById('btn-delete-final').onclick = () => window.deleteRes(r.id);
            document.getElementById('modal-overlay').classList.add('active');
        };

        window.processAction = async (id, status, r) => {
            if(!confirm("確定しますか？")) return;
            try {
                await updateDoc(doc(db, "reservations", id), { status: status });
                if(status === 'accepted') {
                    const q = query(collection(db, "schedules"), where("courseName", "==", r.courseName), where("date", "==", r.courseDate));
                    const snap = await getDocs(q);
                    if(!snap.empty) {
                        const sched = snap.docs[0];
                        const field = r.mode === 'full' ? 'fullApplied' : 'reserved';
                        await updateDoc(doc(db, "schedules", sched.id), { [field]: (sched.data()[field] || 0) + 1 });
                    }
                }
                alert("更新完了"); closeModal();
            } catch (e) { alert("エラー: " + e.message); }
        };

        window.sendMail = async (id, type) => {
            const r = reservations.find(item => item.id === id);
            let sub = "", body = "";
            if(type === 'guide') {
                sub = `【STC下関】受講案内：${r.courseName}`;
                body = `${r.userName} 様\n\nお申し込みありがとうございます。受付が完了いたしました。\n講習名：${r.courseName}\n日程：${r.courseDate}\n\n当日お待ちしております。`;
            } else if(type === 'simple') {
                sub = "【STC下関】書類提出のお願い";
                body = `${r.userName} 様\n\nWEB予約ありがとうございます。\n受講確定のため、2週間前までに「受講申込書」を郵送または持参してください。`;
            } else if(type === 'waiting') {
                sub = "【STC下関】キャンセル待ち登録のご案内";
                body = `${r.userName} 様\n\n現在満員のため、キャンセル待ちとして承りました。`;
            }
            window.location.href = `mailto:${r.email}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
            await updateDoc(doc(db, "reservations", id), { mailStatus: 'sent' });
        };

        window.closeModal = () => document.getElementById('modal-overlay').classList.remove('active');
        window.deleteRes = async (id) => { if(confirm("削除しますか？")) { await deleteDoc(doc(db, "reservations", id)); closeModal(); } };
    </script>
</body>
</html>
