<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約受付管理 | STC 管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+JP:wght@300;700;900&display=swap');
        * { font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b1120; color: #f1f5f9; display: flex; min-height: 100vh; }
        
        /* 統一サイドバー */
        .sidebar { width: 260px; background: #0f172a; border-right: 1px solid rgba(56, 189, 248, 0.1); padding: 40px 20px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
        .sidebar-logo { text-align: center; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        .sidebar-title { font-size: 1.5rem; font-weight: 900; color: #38bdf8; font-style: italic; }
        .nav-link { display: flex; align-items: center; gap: 15px; padding: 14px 20px; color: #94a3b8; text-decoration: none; border-radius: 12px; font-weight: 700; transition: 0.3s; margin-bottom: 8px; font-size: 0.85rem; position: relative; }
        .nav-link.active { background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
        .badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #ef4444; color: white; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-family: 'Montserrat'; font-weight: 900; }
        
        .main-content { flex-grow: 1; padding: 40px 60px; overflow-y: auto; background: radial-gradient(circle at top right, #1e293b, #0b1120); }
        
        /* 受付統計パネル */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(56, 189, 248, 0.1); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-val { font-family: 'Montserrat'; font-size: 1.8rem; font-weight: 900; color: #38bdf8; font-style: italic; }
        .stat-lab { font-size: 0.6rem; color: #64748b; font-weight: 900; text-transform: uppercase; margin-top: 4px; }

        /* テーブル */
        .table-container { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.1); border-radius: 24px; overflow: hidden; }
        .admin-table { width: 100%; border-collapse: collapse; text-align: left; }
        .admin-table th { padding: 20px; font-weight: 900; color: #38bdf8; font-size: 0.65rem; text-transform: uppercase; background: rgba(56, 189, 248, 0.05); border-bottom: 1px solid rgba(56,189,248,0.2); cursor: pointer; }
        .admin-table td { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.8rem; vertical-align: middle; }

        .new-mark { background: #ef4444; width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #ef4444; }
        .wait-mark { background: #f59e0b; width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #f59e0b; }
        
        .tag-mode { font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-weight: 900; }
        .mode-full { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .mode-simple { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        /* モーダル */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #0f172a; border: 1px solid #38bdf8; border-radius: 2.5rem; padding: 40px; width: 95%; max-width: 1000px; max-height: 90vh; overflow-y: auto; }
        
        .info-label { font-size: 0.65rem; color: #64748b; font-weight: 900; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.1em; }
        .info-val { font-weight: 700; color: #fff; font-size: 0.95rem; font-style: italic; }
        
        .btn-mail-action { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3); padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; cursor: pointer; transition: 0.3s; margin-bottom: 4px; }
        .btn-mail-action:hover { background: #38bdf8; color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><div class="sidebar-title">STC</div><div class="sidebar-subtitle">CONTROL PANEL</div></div>
        <nav>
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> <span>ダッシュボード</span></a>
            <a href="schedule.html" class="nav-link"><i class="fas fa-calendar-alt"></i> <span>スケジュール管理</span></a>
            <a href="reservations.html" class="nav-link active"><i class="fas fa-users"></i> <span>予約受付管理</span><span id="new-res-badge" class="badge" style="display:none">0</span></a>
            <a href="news.html" class="nav-link"><i class="fas fa-bullhorn"></i> <span>お知らせ管理</span></a>
            <a href="faq.html" class="nav-link"><i class="fas fa-question-circle"></i> <span>よくある質問管理</span></a>
            <a href="documents.html" class="nav-link"><i class="fas fa-file-alt"></i> <span>書類作成管理</span></a>
        </nav>
    </div>
    
    <div class="main-content">
        <div class="stat-grid">
            <div class="stat-card"><div class="stat-val" id="stat-today">0</div><div class="stat-lab">本日の申込</div></div>
            <div class="stat-card"><div class="stat-val text-red-500" id="stat-new">0</div><div class="stat-lab">未読(バッジ)数</div></div>
            <div class="stat-card"><div class="stat-val text-amber-500" id="stat-wait">0</div><div class="stat-lab">キャンセル待ち</div></div>
            <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-lab">累計申込</div></div>
        </div>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">日時 <i class="fas fa-sort"></i></th>
                        <th onclick="sortTable(1)">種別</th>
                        <th onclick="sortTable(2)">講習コース / 日程 <i class="fas fa-sort"></i></th>
                        <th>受講生名</th>
                        <th>会社名</th>
                        <th>メール連絡</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="res-list"></tbody>
            </table>
        </div>
    </div>

    <!-- 詳細モーダル -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
                <h2 class="text-2xl font-black italic text-sky-400 uppercase tracking-tighter">Application Details</h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white text-3xl">&times;</button>
            </div>
            
            <div id="modal-body" class="grid md:grid-cols-3 gap-8">
                <!-- データはJSで挿入 -->
            </div>

            <div class="mt-12 flex flex-wrap gap-4 pt-8 border-t border-white/5">
                <button id="btn-accept-final" class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-4 rounded-xl font-black italic shadow-lg transition">受付を確定しバッジを消す</button>
                <button id="btn-wait-final" class="bg-amber-600 hover:bg-amber-500 text-white px-8 py-4 rounded-xl font-black italic shadow-lg transition">キャンセル待ちに登録</button>
                <button onclick="closeModal()" class="bg-slate-700 text-white px-8 py-4 rounded-xl font-black italic">閉じる</button>
                <button id="btn-delete-final" class="bg-red-900/50 text-red-400 px-6 py-4 rounded-xl font-black italic text-xs ml-auto">削除</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCrRf1MMCkR_dTIT4mpz2MWdNPJZt3GpYw", authDomain: "stc-hp.firebaseapp.com", projectId: "stc-hp", storageBucket: "stc-hp.firebasestorage.app", messagingSenderId: "795332931918", appId: "1:795332931918:web:dee7ea9d9fbe0ab0942e1f" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let reservations = [];

        signInAnonymously(auth).then(() => {
            onSnapshot(query(collection(db, "reservations"), orderBy("createdAt", "desc")), (snap) => {
                reservations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateDashboard();
                renderTable();
            });
        });

        function updateDashboard() {
            const today = new Date().toLocaleDateString();
            document.getElementById('stat-today').innerText = reservations.filter(r => r.createdAt?.toDate().toLocaleDateString() === today).length;
            const n = reservations.filter(r => r.status === 'new').length;
            document.getElementById('stat-new').innerText = n;
            document.getElementById('stat-wait').innerText = reservations.filter(r => r.status === 'waiting').length;
            document.getElementById('stat-total').innerText = reservations.length;
            
            const badge = document.getElementById('new-res-badge');
            badge.innerText = n;
            badge.style.display = n > 0 ? 'block' : 'none';
        }

        function renderTable() {
            const listEl = document.getElementById('res-list');
            listEl.innerHTML = reservations.map(r => `
                <tr>
                    <td class="text-slate-500 font-en text-[10px]">${r.createdAt?.toDate().toLocaleString() || '-'}</td>
                    <td><span class="tag-mode ${r.mode === 'full' ? 'mode-full' : 'mode-simple'}">${r.mode === 'full' ? '本申込' : '予約のみ'}</span></td>
                    <td>
                        <div class="text-sky-400 font-black italic">${r.courseName}</div>
                        <div class="text-[10px] text-slate-500">${r.courseDate}</div>
                    </td>
                    <td class="font-black italic">${r.status === 'new' ? '<span class="new-mark"></span>' : r.status === 'waiting' ? '<span class="wait-mark"></span>' : ''}${r.userName}</td>
                    <td class="text-slate-400 font-bold">${r.company || '個人'}</td>
                    <td class="flex flex-col">
                        <button class="btn-mail-action" onclick="window.sendMail('${r.id}', 'guide')">受講案内</button>
                        <button class="btn-mail-action" onclick="window.sendMail('${r.id}', 'waiting')">待機依頼</button>
                    </td>
                    <td><button class="bg-sky-500 text-white text-[10px] px-3 py-1.5 rounded-lg font-black italic" onclick="openDetail('${r.id}')">詳細</button></td>
                </tr>
            `).join('');
        }

        window.openDetail = (id) => {
            const r = reservations.find(item => item.id === id);
            const body = document.getElementById('modal-body');
            
            body.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-slate-800 p-4 rounded-2xl border border-white/5">
                        <span class="info-label text-sky-400">Profile Photo</span>
                        ${r.photos?.user ? `<img src="${r.photos.user}" class="w-full rounded-xl shadow-2xl">` : '<p class="text-slate-600 italic py-4 text-center">写真なし</p>'}
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        ${r.photos?.licA ? `<div class="bg-slate-800 p-2 rounded-xl"><img src="${r.photos.licA}" class="w-full rounded"></div>` : ''}
                        ${r.photos?.licB ? `<div class="bg-slate-800 p-2 rounded-xl"><img src="${r.photos.licB}" class="w-full rounded"></div>` : ''}
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="bg-white/5 p-4 rounded-xl"><span class="info-label">氏名</span><p class="text-xl font-black italic">${r.userName} (${r.userKana})</p></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-xl"><span class="info-label">生年月日</span><p class="info-val">${r.birthDate}</p></div>
                        <div class="bg-white/5 p-4 rounded-xl"><span class="info-label">電話番号</span><p class="info-val">${r.phone}</p></div>
                    </div>
                    <div class="bg-white/5 p-4 rounded-xl"><span class="info-label">現住所</span><p class="text-[11px] font-bold">${r.address}</p></div>
                    <div class="bg-white/5 p-4 rounded-xl"><span class="info-label">メールアドレス</span><p class="text-[11px] font-bold">${r.email}</p></div>
                    <div class="bg-sky-500/10 p-4 rounded-xl border border-sky-500/20">
                        <span class="info-label text-sky-400">勤務先</span>
                        <p class="text-sm font-black italic">${r.company || '個人申込'}</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="bg-slate-800 p-6 rounded-xl border border-white/5 space-y-4">
                        <div><span class="info-label">免除条件・資格</span><p class="text-xs font-bold text-emerald-400">${r.licChecked || 'なし'}</p></div>
                        <div><span class="info-label">助成金利用</span><p class="text-xs font-bold">${r.subsidy || 'なし'}</p></div>
                        <div><span class="info-label">領収書宛名</span><p class="text-xs font-bold">${r.receipt === '必要' ? r.receiptName : '不要'}</p></div>
                    </div>
                </div>
            `;
            
            document.getElementById('btn-accept-final').onclick = () => window.processAction(r.id, 'accepted', r);
            document.getElementById('btn-wait-final').onclick = () => window.processAction(r.id, 'waiting', r);
            document.getElementById('btn-delete-final').onclick = () => window.deleteRes(r.id);
            document.getElementById('modal-overlay').classList.add('active');
        };

        window.processAction = async (id, status, r) => {
            if(!confirm("この処理を実行しますか？")) return;
            try {
                await updateDoc(doc(db, "reservations", id), { status: status });
                if(status === 'accepted') {
                    const q = query(collection(db, "schedules"), where("courseName", "==", r.courseName), where("date", "==", r.courseDate));
                    const snap = await getDocs(q);
                    if(!snap.empty) {
                        const sched = snap.docs[0];
                        const field = r.mode === 'full' ? 'fullApplied' : 'reserved';
                        await updateDoc(doc(db, "schedules", sched.id), { [field]: (sched.data()[field] || 0) + 1 });
                    }
                }
                alert("更新が完了しました。"); closeModal();
            } catch (e) { alert("エラー: " + e.message); }
        };

        window.sendMail = (id, type) => {
            const r = reservations.find(item => item.id === id);
            let sub = "", body = "";
            if(type === 'guide') {
                sub = "【STC下関】受講案内のお知らせ";
                body = `${r.userName} 様\n\nお申し込みありがとうございます。受付が完了いたしました。\n講習名：${r.courseName}\n日程：${r.courseDate}\n\n当日お待ちしております。`;
            } else if(type === 'waiting') {
                sub = "【STC下関】キャンセル待ち登録のご案内";
                body = `${r.userName} 様\n\nお申し込みは現在満員のため、キャンセル待ちとして承りました。\n空きが出次第、ご連絡いたします。`;
            }
            window.location.href = `mailto:${r.email}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
        };

        window.closeModal = () => document.getElementById('modal-overlay').classList.remove('active');
        window.deleteRes = async (id) => { if(confirm("完全に削除しますか？")) { await deleteDoc(doc(db, "reservations", id)); closeModal(); } };
    </script>
</body>
</html>
