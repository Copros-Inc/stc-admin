<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書類作成管理 | STC 管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+JP:wght@300;700;900&display=swap');
        
        * {
            font-family: 'Noto Sans JP', sans-serif;
        }
        
        .font-en {
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0b1120 0%, #1a2a4a 100%);
            color: #f1f5f9;
        }
        
        .sidebar {
            background: rgba(15, 23, 42, 0.9);
            border-right: 1px solid rgba(56, 189, 248, 0.2);
            min-height: 100vh;
            padding: 30px 20px;
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
        }
        
        .sidebar-logo {
            margin-bottom: 40px;
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }
        
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 900;
            color: #38bdf8;
            font-style: italic;
            margin-bottom: 5px;
        }
        
        .sidebar-subtitle {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 10px;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .nav-link:hover {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border-left-color: #38bdf8;
        }
        
        .nav-link.active {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            border-left-color: #38bdf8;
        }
        
        .nav-icon {
            width: 20px;
            text-align: center;
        }
        
        .main-content {
            margin-left: 280px;
            padding: 40px;
        }
        
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-style: italic;
        }
        
        .page-subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: bold;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.1);
        }
        
        .card-icon {
            font-size: 2.5rem;
            color: #38bdf8;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 1.25rem;
            font-weight: 900;
            margin-bottom: 8px;
            font-style: italic;
        }
        
        .card-description {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: bold;
        }
        
        .coming-soon {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid rgba(56, 189, 248, 0.2);
                padding: 20px;
            }
            
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- サイドバー -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-title">STC</div>
            <div class="sidebar-subtitle">管理画面</div>
        </div>
        
        <nav>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        <span class="nav-icon"><i class="fas fa-home"></i></span>
                        <span>ダッシュボード</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="schedule.html" class="nav-link">
                        <span class="nav-icon"><i class="fas fa-calendar"></i></span>
                        <span>スケジュール管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="reservations.html" class="nav-link">
                        <span class="nav-icon"><i class="fas fa-users"></i></span>
                        <span>予約受付管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="documents.html" class="nav-link active">
                        <span class="nav-icon"><i class="fas fa-file-alt"></i></span>
                        <span>書類作成管理</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
    
    <!-- メインコンテンツ -->
    <div class="main-content">
        <div class="header">
            <h1 class="page-title">書類作成管理</h1>
            <p class="page-subtitle">修了証や領収書などの書類を作成・発行します</p>
        </div>
        
        <!-- カード -->
        <div class="card-grid">
            <div class="card" style="position: relative;">
                <span class="coming-soon">近日公開</span>
                <div class="card-icon"><i class="fas fa-certificate"></i></div>
                <div class="card-title">修了証の発行</div>
                <div class="card-description">受講者の修了証をPDFで生成・発行</div>
            </div>
            
            <div class="card" style="position: relative;">
                <span class="coming-soon">近日公開</span>
                <div class="card-icon"><i class="fas fa-receipt"></i></div>
                <div class="card-title">領収書の発行</div>
                <div class="card-description">講習費用の領収書を作成・発行</div>
            </div>
            
            <div class="card" style="position: relative;">
                <span class="coming-soon">近日公開</span>
                <div class="card-icon"><i class="fas fa-file-invoice"></i></div>
                <div class="card-title">請求書の作成</div>
                <div class="card-description">企業向け請求書の作成</div>
            </div>
        </div>
    </div>
</body>
</html>
